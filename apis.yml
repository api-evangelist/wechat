    type: Documentation
  - url: https://channels.weixin.qq.com/
    type: Portal
- aid: wechat:wechat-shop-api
  name: WeChat Shop (微信小店) API
  description: WeChat Shop (微信小店) is WeChat's unified merchant storefront tying together Mini Programs, Channels livestreaming, Official Accounts, and WeChat Search. APIs cover product (SPU/SKU) management, order lifecycle, after-sales, logistics, inventory, vouchers, and merchant-side fulfilment hooks for the integrated WeChat commerce graph.

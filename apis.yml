- aid: wechat:wechat-cloud-hosting-api
  name: WeChat Cloud Hosting API
  description: WeChat Cloud Hosting (微信云托管) is Tencent's cloud-native, ops-free container deployment service tightly integrated into the WeChat ecosystem. Documented as "a cloud-native, operations-free, highly available service deployment solution that requires no servers and enables deployment in just one minute." Exposes container deployment APIs, serverless MySQL, object storage with CDN and security validation, native token access (no auth layer needed to call WeChat APIs), the cloud-call service relaying WeChat APIs, message-push routing, WeChat Pay integration without encryption handling, gray deployment and version rollback, real-time log search, resource monitoring, custom alerts, and Enterprise WeChat robot notifications. Supports Node.js, Go, Python, and Java containers plus official templates.
  humanURL: https://developers.weixin.qq.com/miniprogram/dev/wxcloudrun/src/basic/intro.html
  tags:
  - Cloud Hosting
  - Containers
  - Serverless
  - Backend
  - MySQL
  - Object Storage
  - DevOps
  properties:

    type: Documentation
  - url: https://cloud.weixin.qq.com/
    type: Portal
- aid: wechat:wechat-channels-api
  name: WeChat Channels (Video Accounts) Developer Surface
  description: WeChat Channels (视频号) is WeChat's short-video and livestreaming product. The developer surface — exposed through the Mini Programs platform and Channels merchant tools — covers livestream room creation, livestream goods linkage, Channels-driven traffic into Mini Programs, and merchant integrations. There is no fully public OpenAPI; most APIs are gated to qualified Channels merchants and partners.
  humanURL: https://channels.weixin.qq.com/developers
  tags:
  - Video Accounts
  - Channels
  - Live Streaming
  - Short Video
  - Commerce
  properties:

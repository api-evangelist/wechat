- type: Notes
  data:
  - No public OpenAPI / Swagger document is published for any WeChat API surface. SDKs are hand-written from the Chinese reference docs.
  - WeChat has no public global status page; outage information is communicated through the developer community at developers.weixin.qq.com/community/ and via Service Notices in mp.weixin.qq.com.
  - WeChat does not publish a public pricing page for its core APIs — Mini Programs, Official Accounts, and the Server API are free at the API level; WeChat Pay fees are negotiated per-merchant in the merchant agreement and are not posted on a public pricing page.
  - WeChat Pay APIv3 supersedes the legacy APIv2 XML protocol; v2 remains in use but Tencent recommends new integrations target v3.
  - Most product documentation is Chinese-first; English mirrors exist for Mini Programs (`/miniprogram/en/dev/`), WeChat Pay APIv3 (`/wiki/doc/apiv3/en/`), and WeChat Pay Global v3, but coverage outside those is limited.
  - WeChat Work / WeCom does not have a Tencent-maintained Python SDK; the most-used Python wrapper (sbzhu/weworkapi_python) is community-maintained and explicitly disclaims it is "for demonstration purposes only."
  - The github.com/wxopen organization is empty (zero public repos) — not the canonical home for WeChat Open Platform SDKs.

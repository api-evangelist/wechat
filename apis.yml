    type: Portal
- aid: wechat:wechat-open-platform-third-party
  name: WeChat Open Platform — Third-Party Platform API
  description: API surface that lets authorized ISVs operate Official Accounts and Mini Programs on behalf of merchant clients ("代商家调用接口"). Covers merchant authorization onboarding, developing Mini Programs on behalf of merchants (registration, certification, code template upload, version management), initiating web authorization, handling messages and events, using the JS-SDK on behalf of accounts, cloud development integration, domain configuration, privacy settings, and merchant-violation notifications.
  humanURL: https://developers.weixin.qq.com/doc/oplatform/Third-party_Platforms/Authorization_Process_Technical_Description.html

    type: Authentication
- aid: wechat:wechat-mini-programs-client-api
  name: WeChat Mini Programs Client API
  description: Client-side JavaScript API exposed inside the WeChat runtime to Mini Programs and Mini Games. Covers network (wx.request, wx.downloadFile, wx.uploadFile), storage, UI / navigation, media (audio, video, camera, image), location, device (Bluetooth, NFC, Wi-Fi, sensors), file system, canvas, payment invocation (wx.requestPayment), login (wx.login), and the WeChat-provided UI components. Apps are built with WXML / WXSS / JS and packaged via the WeChat Developer Tools.
  humanURL: https://developers.weixin.qq.com/miniprogram/en/dev/api/
  tags:
  - Mini Programs
  - Mini Games
  - Client SDK
  - JavaScript
  - Devices

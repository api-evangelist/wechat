apis:
- aid: wechat:wechat-mini-programs-server-api
  name: WeChat Mini Programs Server API
  description: Backend HTTPS/JSON APIs that Mini Program operators call from their own servers to authenticate user sessions (code2Session), mint access tokens, send customer service and template/subscription messages, generate Mini Program codes / QR codes, run content moderation (msgSecCheck, imgSecCheck, mediaCheckAsync), pull analytics (retention, visit trends, user portraits, page distribution), manage logistics, manage plugins, and verify SOTER biometric signatures. This is the server-side counterpart to the Mini Program JS framework and the primary integration surface for Mini Program publishers.
  humanURL: https://developers.weixin.qq.com/miniprogram/en/dev/api-backend/
  baseURL: https://api.weixin.qq.com
  tags:
  - Mini Programs
  - Server API
  - Authentication
  - Messaging
  - Content Moderation
  - Analytics
  - QR Codes

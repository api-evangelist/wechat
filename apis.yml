- aid: wechat:wechat-pay-apiv3-direct-merchant
  name: WeChat Pay APIv3 (Direct-Connect Merchant)
  description: WeChat Pay's third-generation REST API for mainland-China direct-connect merchants. Authenticates with merchant API certificates and platform-key signed requests over HTTPS/JSON. Covers JSAPI / Native / App / H5 / Mini Program payments, refunds, bill download, merchant transfers, WeChat Pay Score, vouchers, marketing red packets, profit sharing, consumer complaints, and platform certificate rotation. Replaces the legacy XML-based APIv2.
  humanURL: https://pay.weixin.qq.com/wiki/doc/apiv3/en/index.shtml
  baseURL: https://api.mch.weixin.qq.com
  tags:

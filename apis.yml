  name: WeChat Pay Global v3 API
  description: Cross-border WeChat Pay surface for international institutions and merchants accepting payments from WeChat users outside mainland China. Provides a "universal version for global institutions and merchants" with multi-currency settlement, refunds, and reconciliation distinct from the mainland APIv3.

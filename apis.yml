- aid: wechat:wechat-open-platform-mobile-login
  name: WeChat Open Platform — Mobile App Login (OAuth 2.0)
  description: OAuth 2.0 authorization flow exposed by the WeChat Open Platform for native iOS, Android, and HarmonyOS apps. Apps redirect into WeChat to obtain an authorization code, then exchange it via `https://api.weixin.qq.com/sns/oauth2/access_token` for an access token (snsapi_userinfo scope), refresh tokens via `/sns/oauth2/refresh_token`, and fetch profile via `/sns/userinfo`. Access tokens expire in 7200 seconds; refresh tokens last 180 days. Underpins "Login with WeChat" across third-party mobile apps.
  humanURL: https://developers.weixin.qq.com/doc/oplatform/Mobile_App/WeChat_Login/Development_Guide.html
  baseURL: https://api.weixin.qq.com
  tags:
  - Identity
  - OAuth
  - Login
  - Mobile
  - Open Platform
  properties:
  - url: https://developers.weixin.qq.com/doc/oplatform/Mobile_App/WeChat_Login/Development_Guide.html
    type: Documentation
  - url: https://open.weixin.qq.com/
    type: Portal
  - url: https://developers.weixin.qq.com/doc/oplatform/Mobile_App/WeChat_Login/Authorized_Interface_Calling_UnionID.html
    type: APIReference
- aid: wechat:wechat-open-platform-website-login
  name: WeChat Open Platform — Website Login (QR OAuth)
  description: Web-based OAuth 2.0 login that renders a WeChat QR code on third-party websites. End users scan the code in WeChat to authenticate; the website receives a code on its callback URL and exchanges it for a snsapi_login access token plus the user's WeChat OpenID / UnionID. Standard way of adding "Sign in with WeChat" to non-WeChat web properties.
  humanURL: https://developers.weixin.qq.com/doc/oplatform/Website_App/WeChat_Login/Wechat_Login.html
  tags:
  - Identity
  - OAuth
  - Login
  - Web
  - QR Code

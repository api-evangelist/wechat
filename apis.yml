- aid: wechat:wechat-official-accounts-api
  name: WeChat Official Accounts API
  description: HTTPS/JSON APIs for WeChat Official Accounts (Subscription Accounts and Service Accounts) — the publishing surface used by media, brands, and businesses to reach WeChat followers. Surface includes user-info & tagging, message receipt and reply (text, image, voice, video, news), template messages, customer service messages, custom menus, materials and asset management, QR code with scene parameters, web authorization (snsapi_base / snsapi_userinfo), and the JS-SDK for embedded webpages.
  humanURL: https://developers.weixin.qq.com/doc/offiaccount/Getting_Started/Overview.html
  baseURL: https://api.weixin.qq.com
